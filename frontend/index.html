<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - Сокращатель ссылок</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">🔗 URL Shortener</div>
            <div class="auth-buttons" id="authButtons">
                <button class="btn btn-secondary" onclick="showLogin()">Войти</button>
                <button class="btn btn-primary" onclick="showRegister()">Регистрация</button>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span id="userEmail"></span>
                <button class="btn btn-secondary" onclick="logout()">Выйти</button>
            </div>
        </header>

        <!-- Main Form -->
        <div class="main-section">
            <h1>Сократите вашу ссылку</h1>
            <p class="subtitle">Быстро, удобно и бесплатно</p>
            
            <div class="form-container">
                <input 
                    type="url" 
                    id="urlInput" 
                    placeholder="Вставьте длинную ссылку сюда..." 
                    required
                >
                <button class="btn btn-primary btn-large" onclick="shortenUrl()">
                    Сократить ссылку
                </button>
            </div>

            <!-- Result -->
            <div class="result-container" id="resultContainer" style="display: none;">
                <div class="result-header">
                    <span class="success-icon">✅</span>
                    <h3>Готово!</h3>
                </div>
                <div class="short-url">
                    <a href="#" id="shortUrl" target="_blank"></a>
                    <button class="btn-copy" onclick="copyToClipboard()" title="Копировать">
                        📋
                    </button>
                </div>
                <div class="stats-info">
                    <p>📊 Переходов: <strong id="clickCount">0</strong></p>
                    <p>📅 Создано: <strong id="createdAt"></strong></p>
                </div>
            </div>
        </div>

        <!-- My Links -->
        <div class="my-links-section" id="myLinksSection" style="display: none;">
            <h2>Мои ссылки</h2>
            <div id="linksList" class="links-list"></div>
        </div>

        <!-- Auth Modal -->
        <div class="modal" id="authModal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle">Вход</h2>
                
                <form id="authForm" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="authEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="authPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="authSubmitBtn">
                        Войти
                    </button>
                </form>
                
                <p class="switch-auth">
                    <span id="switchText">Нет аккаунта?</span>
                    <a href="#" onclick="switchAuthMode()" id="switchLink">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
